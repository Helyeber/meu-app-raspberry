name: Compilar para Raspberry Pi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Compilar com drivers alternativos
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/python:3.9-slim \
            bash -c "
              apt-get update &&
              apt-get install -y gcc &&  # Só precisa disso!
              
              pip install --upgrade pip setuptools wheel &&
              # Instalar drivers pure Python (sem dependências complicadas)
              pip install pyinstaller pymysql mssql-cli &&
              
              # Para SQL Server, podemos usar sqlalchemy + pymssql ou
              # uma abordagem diferente
              echo '=== COMPILANDO APLICAÇÃO ===' &&
              pyinstaller --onefile --name app_raspberry app.py
            "
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: executavel-raspberry
          path: dist/app_raspberry
