name: Compilar para Raspberry Pi (GLIBC 2.28 - VERSÃO FINAL)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      
      - name: Compilar com Debian Buster
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/python:3.7-buster \
            bash -c "
              echo '=== CONFIGURANDO REPOSITÓRIOS ===' &&
              echo 'deb http://archive.debian.org/debian buster main contrib non-free' > /etc/apt/sources.list &&
              echo 'deb http://archive.debian.org/debian-security buster/updates main contrib non-free' >> /etc/apt/sources.list &&
              
              echo '=== ATUALIZANDO PACOTES ===' &&
              apt-get update -o Acquire::Check-Valid-Until=false &&
              
              echo '=== INSTALANDO DEPENDÊNCIAS DE SISTEMA ===' &&
              apt-get install -y \
                gcc \
                freetds-dev \
                freetds-bin \
                zlib1g-dev \
                libssl-dev \
                libkrb5-dev \
                pkg-config \
                && apt-get clean &&
              
              echo '=== VERIFICANDO GLIBC ===' &&
              ldd --version | head -n1 &&
              
              echo '=== INSTALANDO PACOTES PYTHON ===' &&
              pip install --upgrade pip setuptools wheel &&
              
              # ÚNICA MUDANÇA 1: Instalar versão específica do Cython
              pip install cython==0.29.24 &&
              
              # ÚNICA MUDANÇA 2: pymssql 2.1.5 (mais estável)
              pip install pymssql==2.1.5 &&
              pip install requests==2.31.0 &&
              pip install pyinstaller==5.13.2 &&
              
              echo '=== VERIFICANDO INSTALAÇÃO ===' &&
              python -c \"import pymssql; print('pymssql OK')\" &&
              python -c \"import requests; print('requests OK')\" &&
              
              echo '=== COMPILANDO APLICAÇÃO ===' &&
              pyinstaller --onefile \
                --clean \
                --name app_raspberry \
                --hidden-import pymssql \
                --hidden-import _mssql \
                --hidden-import requests \
                app.py &&
              
              echo '=== VERIFICANDO EXECUTÁVEL ===' &&
              ls -la dist/ || echo 'PASTA DIST VAZIA' &&
              file dist/app_raspberry 2>/dev/null || echo 'EXECUTÁVEL NÃO ENCONTRADO'
            "
      
      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: app_raspberry-final
          path: dist/app_raspberry
          if-no-files-found: warn  # Mudamos para warn em vez de error
