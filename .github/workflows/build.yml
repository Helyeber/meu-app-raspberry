name: Compilar para Raspberry Pi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      
      - name: Compilar com Debian Bullseye
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/debian:bullseye-slim \
            bash -c "
              # Configurar repositórios atualizados
              echo 'deb http://deb.debian.org/debian bullseye main contrib non-free' > /etc/apt/sources.list &&
              echo 'deb http://deb.debian.org/debian-security bullseye-security main contrib non-free' >> /etc/apt/sources.list &&
              echo 'deb http://deb.debian.org/debian bullseye-updates main contrib non-free' >> /etc/apt/sources.list &&
              
              # Atualizar e instalar dependências
              apt-get update &&
              apt-get install -y \
                python3 \
                python3-pip \
                gcc \
                freetds-dev \
                zlib1g-dev \
                libssl-dev \
                libkrb5-dev \
                && rm -rf /var/lib/apt/lists/* &&
              
              # Instalar pacotes Python
              pip3 install --upgrade pip setuptools wheel &&
              pip3 install pyinstaller pymssql &&
              
              # Compilar
              pyinstaller --onefile --name app_raspberry app.py
            "
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: executavel-raspberry
          path: dist/app_raspberry
