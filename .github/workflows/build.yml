name: Compilar para Raspberry Pi (VERSÃO QUE FUNCIONA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      
      - name: Compilar
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/python:3.7-buster \
            bash -c "
              echo '=== CONFIGURANDO REPOSITÓRIOS ===' &&
              echo 'deb http://archive.debian.org/debian buster main contrib non-free' > /etc/apt/sources.list &&
              echo 'deb http://archive.debian.org/debian-security buster/updates main contrib non-free' >> /etc/apt/sources.list &&
              
              echo '=== INSTALANDO DEPENDÊNCIAS ===' &&
              apt-get update -o Acquire::Check-Valid-Until=false &&
              apt-get install -y \
                gcc \
                freetds-dev \
                freetds-bin \
                zlib1g-dev \
                libssl-dev \
                libkrb5-dev \
                && apt-get clean &&
              
              echo '=== INSTALANDO PACOTES PYTHON (VERSÕES CORRETAS) ===' &&
              pip install --upgrade pip setuptools wheel &&
              
              # PASSO 1: Instalar versão específica do Cython
              pip install cython==0.29.24 &&
              
              # PASSO 2: Instalar pymssql 2.1.3 (ÚNICA QUE FUNCIONA NO ARM)
              pip install pymssql==2.1.3 &&
              
              # PASSO 3: Instalar requests e pyinstaller
              pip install requests==2.31.0 &&
              pip install pyinstaller==5.13.2 &&
              
              echo '=== VERIFICANDO INSTALAÇÕES ===' &&
              python -c \"import pymssql; print('✅ pymssql OK')\" &&
              python -c \"import requests; print('✅ requests OK')\" &&
              
              echo '=== COMPILANDO APLICAÇÃO ===' &&
              pyinstaller --onefile \
                --clean \
                --name app_raspberry \
                --hidden-import pymssql \
                --hidden-import _mssql \
                --hidden-import requests \
                app.py &&
              
              echo '=== EXECUTÁVEL GERADO ===' &&
              ls -la dist/ &&
              file dist/app_raspberry
            "
      
      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: app_raspberry-final
          path: dist/app_raspberry
