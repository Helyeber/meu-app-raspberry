name: Compilar para Raspberry Pi (GLIBC 2.28)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm32v7
      
      - name: Compilar com Debian Buster (GLIBC 2.28)
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/debian:buster-slim \
            bash -c "
              # Configurar repositórios do archive.debian.org (Buster)
              echo 'deb http://archive.debian.org/debian buster main contrib non-free' > /etc/apt/sources.list &&
              echo 'deb http://archive.debian.org/debian-security buster/updates main contrib non-free' >> /etc/apt/sources.list &&
              
              # Atualizar lista de pacotes
              apt-get update -o Acquire::Check-Valid-Until=false &&
              
              # Instalar dependências de compilação
              apt-get install -y \
                python3 \
                python3-pip \
                python3-dev \
                gcc \
                freetds-dev \
                zlib1g-dev \
                libssl-dev \
                libkrb5-dev \
                pkg-config \
                && apt-get clean &&
              
              # Verificar versão do GLIBC (deve ser 2.28)
              echo '=== VERIFICANDO GLIBC ===' &&
              ldd --version | head -n1 &&
              
              # Instalar pacotes Python
              echo '=== INSTALANDO PACOTES PYTHON ===' &&
              pip3 install --upgrade pip setuptools wheel &&
              pip3 install pyinstaller pymssql &&
              
              # Compilar com flags para garantir compatibilidade
              echo '=== COMPILANDO APLICAÇÃO ===' &&
              pyinstaller --onefile \
                --clean \
                --name app_raspberry \
                --hidden-import pymssql \
                --hidden-import _mssql \
                app.py &&
              
              # Verificar GLIBC requerida
              echo '=== GLIBC REQUERIDA PELO EXECUTÁVEL ===' &&
              readelf -V dist/app_raspberry | grep GLIBC_2 || true
            "
      
      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: app_raspberry-glibc228
          path: dist/app_raspberry
          if-no-files-found: error
