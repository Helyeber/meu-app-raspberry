name: Compilar para Raspberry Pi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Compilar com imagem completa
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            arm32v7/python:3.9-buster \
            bash -c "
              apt-get update &&
              apt-get install -y \
                gcc \
                freetds-dev \
                freetds-bin \
                zlib1g-dev \
                libssl-dev \
                libkrb5-dev \
                krb5-user \
                && apt-get clean &&
              
              pip install --upgrade pip setuptools wheel &&
              pip install pyinstaller pymssql &&
              
              pyinstaller --onefile --name app_raspberry app.py
            "
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: executavel-raspberry
          path: dist/app_raspberry
